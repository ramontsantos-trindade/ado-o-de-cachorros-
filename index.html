<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adoção de Cachorros</title>
</head>

<body>
    <header>
        <div class="pirin">
            <h1>Portal de Adoção</h1>
            <p>Encontre seu novo melhor amigo</p>
        </div>

    </header>

    <main>
        <div class="form-container">
            <form class="form-adocao">

                <div class="campo">
                    <label>Nome Completo</label>
                    <input type="text" name="nome" required minlength="3">
                </div>

                <div class="campo">
                    <label>E-mail:</label>
                    <input type="email" name="email" required>
                </div>

                <div class="linha-dupla">
                    <div class="campo">
                        <label>Telefone:</label>
                        <input type="tel" name="Telefone" placeholder="(00)00000-0000" required>
                    </div>
                    <div class="campo">
                        <label>CPF:</label>
                        <input type="text" name="CPF" required>
                    </div>
                </div>

                <div class="linha-dupla">
                    <div class="campo">
                        <label>idade:</label>
                        <input type="number" name="idade" required>
                    </div>
                    <div class="campo">
                        <label>Cidade:</label>
                        <input type="text" name="Cidade" required>
                    </div>
                </div>

                <div class="campo">
                    <label>Tipo de Moradia:</label>
                    <select name="tipoMoradia" class="select-moradia">
                        <option value="">Selecione...</option>
                        <option value="casa">Casa</option>
                        <option value="apartamento">apartamento</option>
                    </select>
                </div>

                
            </form>
            
        </div>
    </main>

    <footer>

    </footer>
</body>

</html>
