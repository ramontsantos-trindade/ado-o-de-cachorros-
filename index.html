<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adoção de Cachorros</title>
</head>

<link rel="stylesheet" href="style.css">

<body>
    <header>
        <div class="pirin">
            <h1>Portal de Adoção</h1>
            <p>Encontre seu novo melhor amigo</p>
        </div>

    </header>

    <main>
        <div class="form-container">
            <form class="form-adocao">

                <div class="campo">
                    <label>Nome Completo</label>
                    <input type="text" name="nome" required minlength="3">
                </div>

                <div class="campo">
                    <label>E-mail:</label>
                    <input type="email" name="email" required>
                </div>

                <div class="linha-dupla">
                    <div class="campo">
                        <label>Telefone:</label>
                        <input type="tel" name="Telefone" placeholder="(00)00000-0000" required>
                    </div>
                    <div class="campo">
                        <label>CPF:</label>
                        <input type="text" name="CPF" required>
                    </div>
                </div>

                <div class="linha-dupla">
                    <div class="campo">
                        <label>idade:</label>
                        <input type="number" name="idade" required>
                    </div>
                    <div class="campo">
                        <label>Cidade:</label>
                        <input type="text" name="Cidade" required>
                    </div>
                </div>

                <div class="campo">
                    <label>Tipo de Moradia:</label>
                    <select name="tipoMoradia" class="select-moradia">
                        <option value="">Selecione...</option>
                        <option value="casa">Casa</option>
                        <option value="apartamento">apartamento</option>
                    </select>
                </div>

                <div class="extra-casa hidden">
                    <div class="campo">
                        <label>Possui quintal?</label>
                        <select name="possuiQuintal" class="selec-quintal">
                            <option value="nao">Não</option>
                            <option value="sim">Sim</option>
                        </select>
                    </div>
                    <div class="extra-segurança campo hidden">
                        <label>O quintal é seguro (muro/portões)?</label>
                        <select name="quintalSeguro">
                            <option value="nao">Não</option>
                            <option value="sim">Sim</option>
                        </select>
                    </div>
                </div>

                <div class="extra-apto campo hidden">
                    <label>O condominio permite animais?</label>
                    <select name="permiteAnimais">
                        <option value="nao">Não</option>
                        <option value="sim">Sim</option>
                    </select>
                </div>

                <div class="campo">
                    <label>Já teve pet antes?</label>
                    <select name="name" required>
                        <option value="nao">Não</option>
                        <option value="sim">Sim</option>
                    </select>
                </div>

                <div class="campo">
                    <label>Horas sozinho por dia</label>
                    <input type="number" name="horaSozinho" required>
                </div>

                <div class="campo">
                    <label>Motivo da Adoção</label>
                    <textarea name="motivo" rows="3" required></textarea>
                </div>

                <div class="campo">
                    <label>Decidiu adotar hoje?</label>
                    <select name="decidiuHoje">
                        <option value="nao">Não</option>
                        <option value="sim">Sim</option>
                    </select>
                </div>

                <div class="campo check">
                    <input type="checkbox" name="termo">
                    <span>Aceito o termo de responsabilidade</span>
                </div>

                <button type="submit">Enviar Cadastro</button>
            </form>
            <div class="mensagem-sucesso hidden"></div>
        </div>
    </main>

    <footer>
        <p>ONG de Proteção Animal</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
